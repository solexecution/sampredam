<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-layout" id="editorLayout">

    <!-- Sidebar -->
    <aside class="editor-sidebar" id="editorSidebar">
      <div class="sidebar-header">
        <h1 class="editor-logo">Listing Editor</h1>
        <button class="sidebar-toggle" id="sidebarToggle" title="Collapse sidebar">&#x276E;</button>
      </div>
      <nav class="editor-nav">
        <button class="nav-item active" data-section="property">Property Details</button>
        <button class="nav-item" data-section="description">Description</button>
        <button class="nav-item" data-section="features">Key Features</button>
        <button class="nav-item" data-section="rooms">Rooms</button>
        <button class="nav-item" data-section="gallery">Gallery &amp; Images</button>
        <button class="nav-item" data-section="floorplans">Floor Plans</button>
        <button class="nav-item" data-section="contact">Contact &amp; Viewings</button>
        <button class="nav-item" data-section="auction">Auction / Deadline</button>
        <button class="nav-item" data-section="referral">Share &amp; Earn</button>
        <button class="nav-item" data-section="faq">FAQ</button>
        <button class="nav-item" data-section="site">Site Settings</button>
      </nav>
      <div class="editor-actions">
        <button id="saveBtn" class="btn-save">Save Changes</button>
        <button id="deployBtn" class="btn-deploy">Deploy to Live Site</button>
      </div>
      <div id="statusBar" class="status-bar"></div>
    </aside>

    <!-- Resize handle: Sidebar ↔ Editor -->
    <div class="resize-handle" id="handleSidebar" title="Drag to resize"></div>

    <!-- Form panel -->
    <main class="editor-panel" id="editorPanel">
      <div class="loading">Loading config...</div>
    </main>

    <!-- Resize handle: Editor ↔ Preview -->
    <div class="resize-handle" id="handlePreview" title="Drag to resize"></div>

    <!-- Preview panel -->
    <section class="editor-preview" id="editorPreview">
      <div class="preview-toolbar">
        <div class="preview-tabs">
          <button class="preview-tab active" id="tabEditing" title="Your local edits">Editing</button>
          <button class="preview-tab" id="tabLive" title="Currently published version">Live</button>
          <button class="preview-tab" id="tabSplit" title="Side by side comparison">Split</button>
        </div>
        <button id="refreshPreview" title="Refresh preview">Refresh</button>
        <a href="https://40sheridan.xyz" target="_blank" rel="noopener" class="live-site-link-preview" title="Open live site">https://40sheridan.xyz &#x2197;</a>
      </div>
      <div class="preview-frames">
        <div class="preview-frame-wrap" id="editingWrap">
          <div class="frame-label">Editing</div>
          <iframe id="previewFrame" src="/preview/index.html"></iframe>
        </div>
        <div class="preview-frame-wrap" id="liveWrap" hidden>
          <div class="frame-label frame-label-live">Live</div>
          <iframe id="liveFrame"></iframe>
        </div>
      </div>
    </section>

  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Deploy modal -->
  <div id="deployModal" class="modal-overlay" hidden>
    <div class="modal">
      <h3>Deploy to Live Site</h3>
      <p id="deployChanges"></p>
      <div class="form-group">
        <label for="commitMsg">Commit message</label>
        <input type="text" id="commitMsg" value="Update listing via editor" placeholder="Describe your changes">
      </div>
      <div class="modal-actions">
        <button id="deployConfirm" class="btn-save">Deploy Now</button>
        <button id="deployCancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="editor.js"></script>
</body>
</html>
